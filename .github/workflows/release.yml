name: Release Build

on:
  push:
    tags:
      - "v*"

jobs:
  build-windows:
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        arch: [x64, arm64]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: desktop/package-lock.json

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r code/config/requirements.txt pyinstaller
          cd desktop
          npm ci

      - name: Build backend executable
        run: |
          pyinstaller --name latex_editor_backend --onefile --noconsole --distpath desktop/backend-dist --workpath build/pyinstaller --specpath build --clean --noconfirm code/backend/app.py

      - name: Build desktop installer
        working-directory: desktop
        run: npx electron-builder --win --${{ matrix.arch }}

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-${{ matrix.arch }}-dist
          path: dist/*
